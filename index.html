
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Attendance Donut Chart Generator</title>

<!-- ✅ Correct Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- ✅ Correct DataLabels plugin -->
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    padding: 20px;
}
.container {
    width: 95%;
    max-width: 600px;
    margin: auto;
    background: #fff;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
h2 { text-align: center; }
input, textarea {
    width: 100%; padding: 10px;
    border: 1px solid #ccc; border-radius: 6px;
    margin-bottom: 15px;
}
button {
    width: 100%; padding: 14px;
    background: #0066ff; color: white;
    border-radius: 6px; border: none;
    font-size: 16px; cursor: pointer;
}
button:hover { background: #004acc; }

.chart-container {
    width: 350px;
    height: 350px;
    margin: 30px auto;
}
#donutChart {
    width: 100% !important;
    height: 100% !important;
}
.title {
    text-align: center;
    font-weight: bold;
    margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">
    <h2>Attendance Donut Chart Generator</h2>

    <label><b>Date:</b></label>
    <input type="date" id="dateInput">

    <label><b>Shikshak Name:</b></label>
    <input type="text" id="teacherInput" placeholder="Enter teacher name">

    <label><b>Enter Names (one per line):</b></label>
    <textarea id="namesInput" rows="8" placeholder=""></textarea>

    <button onclick="generateChart()">Generate Chart</button>

    <div id="chartTitle" class="title"></div>

    <div class="chart-container">
        <canvas id="donutChart"></canvas>
    </div>
</div>

<script>
// ✅ CENTER TEXT PLUGIN
const centerTextPlugin = {
    id: 'centerText',
    afterDraw(chart, args, options) {
        const { ctx } = chart;
        ctx.save();
        ctx.font = "bold 20px Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = "black";
        ctx.fillText(`Count : ${options.count}`, chart.width / 2, chart.height / 2 - 10);

        ctx.font = "16px Arial";
        ctx.fillText(`Shikshak : ${options.teacher}`, chart.width / 2, chart.height / 2 + 20);
        ctx.restore();
    }
};

let chartInstance = null;

// ✅ GENERATE CHART FUNCTION
function generateChart() {
    const rawNames = document.getElementById("namesInput").value.trim();
    const teacher = document.getElementById("teacherInput").value.trim();
    const date = document.getElementById("dateInput").value;

    if (!rawNames || !teacher || !date) {
        alert("Please fill all fields.");
        return;
    }

    const attendees = rawNames.split("\n").map(n => n.trim()).filter(n => n);
    const count = attendees.length;
    const values = attendees.map(() => 1);

    const colors = [
        "#5DA9E9", "#787A7D", "#C05746", "#1D3C62", "#EB8A3E",
        "#9E7B17", "#1D4E89", "#6EA04F", "#4671D5", "#F5C046",
        "#A4A4A4", "#C3D825", "#FF8C61", "#6A4C93"
    ];

    document.getElementById("chartTitle").innerHTML =
        `Attendees, ${date}`;

    const ctx = document.getElementById("donutChart").getContext("2d");
    if (chartInstance) chartInstance.destroy();

    chartInstance = new Chart(ctx, {
        type: "doughnut",
        plugins: [ChartDataLabels, centerTextPlugin],
        data: {
            labels: attendees,
            datasets: [{
                data: values,
                backgroundColor: colors.slice(0, attendees.length),
                borderColor: "#fff",
                borderWidth: 2
            }]
        },
        options: {
            cutout: "55%",
            plugins: {
                legend: { display: false },
                datalabels: {
                    color: "#fff",
                    font: { size: 12, weight: "bold" },
                    formatter: (_, ctx) => ctx.chart.data.labels[ctx.dataIndex]
                },
                centerText: {
                    count: count,
                    teacher: teacher
                }
            }
        }
    });
}
</script>

</body>
</html>
