
<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<title>Attendance Donut Chart</title>

<script src='https://cdn.jsdelivr.net/npm/chart.js'></script>
<script src='https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2'></script>

<style>
body { font-family: Arial; background:#f4f4f4; padding:20px; }
.container { width:95%; max-width:600px; margin:auto; background:white; padding:25px; border-radius:12px; }
.chart-box { margin-top:25px; text-align:center; }
</style>
</head>
<body>
<div class='container'>
<h2>Attendance Donut Chart</h2>
<label>Date:</label>
<input type='date' id='dateInput'>
<label>Shikshak Name:</label>
<input type='text' id='teacherInput'>
<label>Names (one per line):</label>
<textarea id='namesInput' rows='8'></textarea>
<button onclick='generateChart()'>Generate Chart</button>
<div class='chart-box'><canvas id='donutChart'></canvas></div>
</div>

<script>
const centerTextPlugin={id:'centerText',afterDraw(chart,args,opt){const{ctx}=chart;ctx.save();ctx.font='bold 20px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='black';ctx.fillText(`Count : ${opt.count}`,chart.width/2,chart.height/2-12);ctx.font='16px Arial';ctx.fillText(`Shikshak : ${opt.teacher}`,chart.width/2,chart.height/2+18);ctx.restore();}};
let chartInstance=null;
function generateChart(){const raw=document.getElementById('namesInput').value.trim();const teacher=document.getElementById('teacherInput').value.trim();const date=document.getElementById('dateInput').value; if(!raw||!teacher||!date){alert('Fill all fields');return;} const attendees=raw.split('
').map(x=>x.trim()).filter(x=>x); const count=attendees.length; const values=attendees.map(()=>1);
const colors=['#5DA9E9','#787A7D','#C05746','#1D3C62','#EB8A3E','#9E7B17','#1D4E89','#6EA04F','#4671D5','#F5C046','#A4A4A4','#C3D825','#FF8C61','#6A4C93'];
const ctx=document.getElementById('donutChart').getContext('2d'); if(chartInstance) chartInstance.destroy();
chartInstance=new Chart(ctx,{type:'doughnut',plugins:[ChartDataLabels,centerTextPlugin],data:{labels:attendees,datasets:[{data:values,backgroundColor:colors.slice(0,attendees.length),borderColor:'#fff',borderWidth:2}]},options:{cutout:'55%',plugins:{legend:{display:false},title:{display:true,text:`Attendees — ${date}`,font:{size:20}},datalabels:{color:'#fff',font:{size:12,weight:'bold'},formatter:(v,ctx)=>ctx.chart.data.labels[ctx.dataIndex]},centerText:{count:count,teacher:teacher}}});}
</script>

</body>
</html>
